# =============================================
# Configuración del perfil de PRUEBAS (test)
# Usa H2 en memoria — no requiere MySQL corriendo
# =============================================

# Base de datos H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea y destruye el esquema automáticamente en cada ejecución de tests
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Deshabilitar Flyway en tests (H2 y Flyway con scripts MySQL son incompatibles)
spring.flyway.enabled=false

# Desactivar Swagger UI en tests
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Silenciar logs durante los tests para una salida más limpia
logging.level.root=warn
logging.level.com.example.clientes=warn
