spring.application.name=ventas
server.port=8084

# Configuración de la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/db_ventas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=my-secret-pw
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.repair=true

# URLs de microservicios (Feign fallback para desarrollo local)
clientes.api.url=http://localhost:8081/api/v1
productos.api.url=http://localhost:8082/api/v1

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Configuración de logs
logging.level.root=info
logging.level.com.duoc.ventas=info
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.file.name=logs/ventas.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# Swagger / SpringDoc OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
