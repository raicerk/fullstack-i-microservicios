<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Microservicios</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        duocnavy: {
                            50: '#f0f4f8',
                            100: '#dbe5ef',
                            200: '#bdcfe2',
                            300: '#90b0ce',
                            400: '#5e8cb5',
                            500: '#3e709a',
                            600: '#2e577d',
                            700: '#254766',
                            800: '#1b334a',
                            900: '#001f3d',
                            DEFAULT: '#001f3d'
                        },
                        duocamber: {
                            50: '#fffbeb',
                            100: '#fef3c7',
                            200: '#fde58a',
                            300: '#fbe53d',
                            400: '#f5b50b',
                            500: '#f2b819',
                            600: '#d99e0c',
                            700: '#b47b0a',
                            800: '#92600d',
                            900: '#784e0f',
                            DEFAULT: '#f2b819'
                        }
                    }
                }
            }
        }
    </script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GATEWAY_URL       = 'http://localhost:8080/api/v1';
        const PRODUCTOS_API_URL = `${GATEWAY_URL}/productos`;
        const CATEGORIAS_API_URL = `${GATEWAY_URL}/categorias`;
        const CLIENTES_API_URL  = `${GATEWAY_URL}/clientes`;
        const VENTAS_API_URL    = `${GATEWAY_URL}/ventas`;

        function App() {
            // --- TAB ACTIVO ---
            const [activeTab, setActiveTab] = useState('productos');

            // --- TOAST ---
            const [toast, setToast] = useState({ visible: false, message: '', type: 'success' });
            const showToast = (message, type = 'success') => {
                setToast({ visible: true, message, type });
                setTimeout(() => setToast(prev => ({ ...prev, visible: false })), 4000);
            };

            // =====================================================================
            // ESTADO: CATEGORÍAS
            // =====================================================================
            const [categories, setCategories] = useState([]);
            const [loadingCategories, setLoadingCategories] = useState(false);
            const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
            const [categoryFormData, setCategoryFormData] = useState({ nombre: '' });

            const loadCategories = async () => {
                setLoadingCategories(true);
                try {
                    const response = await fetch(CATEGORIAS_API_URL);
                    if (response.status === 204) { setCategories([]); return; }
                    if (!response.ok) throw new Error();
                    setCategories(await response.json());
                } catch (err) {
                    console.error("No se pudieron cargar las categorías.");
                } finally {
                    setLoadingCategories(false);
                }
            };

            const handleCategorySubmit = async (e) => {
                e.preventDefault();
                try {
                    const response = await fetch(CATEGORIAS_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ nombre: categoryFormData.nombre.trim() })
                    });
                    if (response.ok || response.status === 201) {
                        showToast('¡Categoría creada correctamente!', 'success');
                        setIsCategoryModalOpen(false);
                        setCategoryFormData({ nombre: '' });
                        loadCategories();
                    } else {
                        showToast('Error al crear la categoría.', 'danger');
                    }
                } catch (err) {
                    showToast('Error de red al crear la categoría.', 'danger');
                }
            };

            const handleDeleteCategory = async (id) => {
                if (!confirm(`¿Estás seguro de eliminar la categoría #${id}?`)) return;
                try {
                    const response = await fetch(`${CATEGORIAS_API_URL}/${id}`, { method: 'DELETE' });
                    if (response.status === 204 || response.ok) {
                        showToast('Categoría eliminada correctamente', 'success');
                        loadCategories();
                    } else {
                        showToast('No se pudo eliminar la categoría.', 'danger');
                    }
                } catch (err) {
                    showToast('Error al intentar eliminar la categoría.', 'danger');
                }
            };

            // =====================================================================
            // ESTADO: PRODUCTOS
            // =====================================================================
            const [productos, setProductos] = useState([]);
            const [loadingProductos, setLoadingProductos] = useState(false);
            const [errorProductos, setErrorProductos] = useState('');
            const [searchProducto, setSearchProducto] = useState('');
            const [isSearchProductoActive, setIsSearchProductoActive] = useState(false);
            const [isProductoModalOpen, setIsProductoModalOpen] = useState(false);
            const [productoFormData, setProductoFormData] = useState({ id: '', nombre: '', precio: '', categoria: '' });

            // =====================================================================
            // ESTADO: VENTAS
            // =====================================================================
            const [ventas, setVentas] = useState([]);
            const [loadingVentas, setLoadingVentas] = useState(false);
            const [errorVentas, setErrorVentas] = useState('');
            const [isVentaModalOpen, setIsVentaModalOpen] = useState(false);
            const [ventaFormData, setVentaFormData] = useState({ clienteId: '', productoId: '', cantidad: '', notas: '' });

            const clpFormatter = new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', minimumFractionDigits: 0 });

            const loadProducts = async (filterName = '') => {
                setLoadingProductos(true);
                setErrorProductos('');
                try {
                    const url = filterName ? `${PRODUCTOS_API_URL}?nombre=${encodeURIComponent(filterName)}` : PRODUCTOS_API_URL;
                    const response = await fetch(url);
                    if (response.status === 204) {
                        setProductos([]);
                        setErrorProductos(filterName ? 'No se encontraron productos coincidentes.' : 'No hay productos en el inventario.');
                        return;
                    }
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    setProductos(data);
                    if (data.length === 0) setErrorProductos('No hay productos que mostrar.');
                } catch (err) {
                    setProductos([]);
                    setErrorProductos('Error de conexión con el gateway (puerto 8080).');
                } finally {
                    setLoadingProductos(false);
                }
            };

            const handleEditProductoClick = async (id) => {
                try {
                    const response = await fetch(`${PRODUCTOS_API_URL}/${id}`);
                    if (!response.ok) throw new Error();
                    const p = await response.json();
                    setProductoFormData({ id: p.id, nombre: p.nombre || '', precio: p.precio, categoria: p.categoria || '' });
                    setIsProductoModalOpen(true);
                } catch (err) {
                    showToast('No se pudieron recuperar los datos del producto.', 'danger');
                }
            };

            const handleDeleteProducto = async (id) => {
                if (!confirm(`¿Estás seguro de eliminar el producto #${id}?`)) return;
                try {
                    const response = await fetch(`${PRODUCTOS_API_URL}/${id}`, { method: 'DELETE' });
                    if (response.status === 204 || response.ok) {
                        showToast('Producto eliminado correctamente', 'success');
                        loadProducts(isSearchProductoActive ? searchProducto : '');
                    } else {
                        showToast('El producto no existe o ya fue eliminado.', 'danger');
                    }
                } catch (err) {
                    showToast('Error al intentar eliminar el producto.', 'danger');
                }
            };

            const handleProductoFormSubmit = async (e) => {
                e.preventDefault();
                const payload = {
                    nombre: productoFormData.nombre.trim() || null,
                    precio: parseInt(productoFormData.precio, 10),
                    categoria: productoFormData.categoria || null
                };
                const isEdit = !!productoFormData.id;
                const url = isEdit ? `${PRODUCTOS_API_URL}/${productoFormData.id}` : PRODUCTOS_API_URL;
                try {
                    const response = await fetch(url, {
                        method: isEdit ? 'PUT' : 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok || response.status === 201) {
                        showToast(isEdit ? 'Producto actualizado' : 'Producto creado', 'success');
                        setIsProductoModalOpen(false);
                        loadProducts();
                    } else {
                        const msg = response.status === 404 ? 'Categoría no registrada o producto no encontrado.' : 'Campos inválidos.';
                        showToast(`Error (${response.status}): ${msg}`, 'danger');
                    }
                } catch (err) {
                    showToast('Error de red al intentar guardar el producto.', 'danger');
                }
            };

            // =====================================================================
            // ESTADO: CLIENTES
            // =====================================================================
            const [clientes, setClientes] = useState([]);
            const [loadingClientes, setLoadingClientes] = useState(false);
            const [errorClientes, setErrorClientes] = useState('');
            const [searchCliente, setSearchCliente] = useState('');
            const [isSearchClienteActive, setIsSearchClienteActive] = useState(false);
            const [isClienteModalOpen, setIsClienteModalOpen] = useState(false);
            const [clienteFormData, setClienteFormData] = useState({ id: '', nombre: '', email: '' });

            const loadClientes = async (filterNombre = '') => {
                setLoadingClientes(true);
                setErrorClientes('');
                try {
                    const url = filterNombre ? `${CLIENTES_API_URL}?nombre=${encodeURIComponent(filterNombre)}` : CLIENTES_API_URL;
                    const response = await fetch(url);
                    if (response.status === 204) {
                        setClientes([]);
                        setErrorClientes(filterNombre ? 'No se encontraron clientes coincidentes.' : 'No hay clientes registrados.');
                        return;
                    }
                    if (!response.ok) throw new Error();
                    const data = await response.json();
                    setClientes(data);
                    if (data.length === 0) setErrorClientes('No hay clientes que mostrar.');
                } catch (err) {
                    setClientes([]);
                    setErrorClientes('Error de conexión con el gateway (puerto 8080).');
                } finally {
                    setLoadingClientes(false);
                }
            };

            const handleEditClienteClick = async (id) => {
                try {
                    const response = await fetch(`${CLIENTES_API_URL}/${id}`);
                    if (!response.ok) throw new Error();
                    const c = await response.json();
                    setClienteFormData({ id: c.id, nombre: c.nombre || '', email: c.email || '' });
                    setIsClienteModalOpen(true);
                } catch (err) {
                    showToast('No se pudieron recuperar los datos del cliente.', 'danger');
                }
            };

            const handleDeleteCliente = async (id) => {
                if (!confirm(`¿Estás seguro de eliminar el cliente #${id}?`)) return;
                try {
                    const response = await fetch(`${CLIENTES_API_URL}/${id}`, { method: 'DELETE' });
                    if (response.status === 204 || response.ok) {
                        showToast('Cliente eliminado correctamente', 'success');
                        loadClientes(isSearchClienteActive ? searchCliente : '');
                    } else {
                        showToast('El cliente no existe o ya fue eliminado.', 'danger');
                    }
                } catch (err) {
                    showToast('Error al intentar eliminar el cliente.', 'danger');
                }
            };

            const handleClienteFormSubmit = async (e) => {
                e.preventDefault();
                const payload = {
                    nombre: clienteFormData.nombre.trim(),
                    email: clienteFormData.email.trim()
                };
                const isEdit = !!clienteFormData.id;
                const url = isEdit ? `${CLIENTES_API_URL}/${clienteFormData.id}` : CLIENTES_API_URL;
                try {
                    const response = await fetch(url, {
                        method: isEdit ? 'PUT' : 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok || response.status === 201) {
                        showToast(isEdit ? 'Cliente actualizado' : 'Cliente creado', 'success');
                        setIsClienteModalOpen(false);
                        loadClientes();
                    } else {
                        const msg = response.status === 400 ? 'Datos inválidos. Revisa nombre y email.' : 'Error inesperado.';
                        showToast(`Error (${response.status}): ${msg}`, 'danger');
                    }
                } catch (err) {
                    showToast('Error de red al intentar guardar el cliente.', 'danger');
                }
            };

            const loadVentas = async () => {
                setLoadingVentas(true);
                setErrorVentas('');
                try {
                    const response = await fetch(VENTAS_API_URL);
                    if (response.status === 204) { setVentas([]); setErrorVentas('No hay ventas registradas.'); return; }
                    if (!response.ok) throw new Error();
                    setVentas(await response.json());
                } catch (err) {
                    setVentas([]);
                    setErrorVentas('Error de conexión con el gateway (puerto 8080).');
                } finally {
                    setLoadingVentas(false);
                }
            };

            const handleVentaFormSubmit = async (e) => {
                e.preventDefault();
                const payload = {
                    clienteId: parseInt(ventaFormData.clienteId, 10),
                    productoId: parseInt(ventaFormData.productoId, 10),
                    cantidad: parseInt(ventaFormData.cantidad, 10),
                    notas: ventaFormData.notas.trim() || null
                };
                try {
                    const response = await fetch(VENTAS_API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.status === 201) {
                        showToast('Venta registrada correctamente', 'success');
                        setIsVentaModalOpen(false);
                        setVentaFormData({ clienteId: '', productoId: '', cantidad: '', notas: '' });
                        loadVentas();
                    } else {
                        const body = await response.json().catch(() => ({}));
                        const msg = body.error || 'Datos inválidos o cliente/producto no encontrado.';
                        showToast(`Error (${response.status}): ${msg}`, 'danger');
                    }
                } catch (err) {
                    showToast('Error de red al registrar la venta.', 'danger');
                }
            };

            const handleDeleteVenta = async (id) => {
                if (!confirm(`¿Estás seguro de eliminar la venta #${id}?`)) return;
                try {
                    const response = await fetch(`${VENTAS_API_URL}/${id}`, { method: 'DELETE' });
                    if (response.status === 204) {
                        showToast('Venta eliminada correctamente', 'success');
                        loadVentas();
                    } else {
                        showToast('No se pudo eliminar la venta.', 'danger');
                    }
                } catch (err) {
                    showToast('Error al intentar eliminar la venta.', 'danger');
                }
            };

            // --- CARGA INICIAL ---
            useEffect(() => {
                loadProducts();
                loadCategories();
                loadClientes();
                loadVentas();
            }, []);

            // =====================================================================
            // RENDER
            // =====================================================================
            return (
                <div>
                             <header class="bg-duocnavy-900 text-white shadow-md border-b-4 border-duocamber-500">
                        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <span class="text-2xl">🏗️</span>
                                <div>
                                    <h1 class="text-xl font-bold tracking-tight">Gestión de Microservicios — Duoc UC</h1>
                                    <p class="text-xs text-slate-300">Productos · Clientes · Categorías · Ventas — vía API Gateway :8080</p>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 bg-duocnavy-800 px-3 py-1.5 rounded-lg text-xs font-mono border border-duocnavy-700">
                                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                <span>Gateway localhost:8080</span>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div class="max-w-7xl mx-auto px-4 flex gap-1 pt-1">
                            {[
                                { key: 'productos',  label: '📦 Productos' },
                                { key: 'clientes',   label: '👤 Clientes' },
                                { key: 'categorias', label: '🏷️ Categorías' },
                                { key: 'ventas',     label: '🧾 Ventas' }
                            ].map(tab => (
                                <button
                                    key={tab.key}
                                    onClick={() => setActiveTab(tab.key)}
                                    class={`px-5 py-2 text-sm font-semibold rounded-t-lg transition ${
                                        activeTab === tab.key
                                            ? 'bg-white text-duocnavy-900 border-t-2 border-x border-slate-200'
                                            : 'text-slate-300 hover:bg-duocnavy-800 hover:text-white'
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </header>

                    <main class="max-w-7xl mx-auto px-4 py-8">

                        {/* ============================== TAB: PRODUCTOS ============================== */}
                        {activeTab === 'productos' && (
                            <div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <form onSubmit={(e) => { e.preventDefault(); const t = searchProducto.trim(); setIsSearchProductoActive(!!t); loadProducts(t); }} class="flex flex-1 max-w-md gap-2">
                                        <input type="text" placeholder="Buscar producto por nombre..." value={searchProducto}
                                            onChange={(e) => setSearchProducto(e.target.value)}
                                            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                        <button type="submit" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition">Buscar</button>
                                        {isSearchProductoActive && (
                                            <button type="button" onClick={() => { setSearchProducto(''); setIsSearchProductoActive(false); loadProducts(); }} class="text-slate-500 hover:text-slate-800 text-sm px-2">Limpiar</button>
                                        )}
                                    </form>
                                    <button onClick={() => { setProductoFormData({ id: '', nombre: '', precio: '', categoria: '' }); setIsProductoModalOpen(true); }}
                                        class="bg-duocamber-500 hover:bg-duocamber-600 text-duocnavy-900 font-bold px-5 py-2.5 rounded-lg text-sm font-semibold shadow flex items-center gap-2 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                        Nuevo Producto
                                    </button>
                                </div>

                                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse">
                                            <thead>
                                                <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-semibold border-b border-slate-200">
                                                    <th class="px-6 py-4">ID</th>
                                                    <th class="px-6 py-4">Nombre</th>
                                                    <th class="px-6 py-4">Categoría</th>
                                                    <th class="px-6 py-4 text-right">Precio</th>
                                                    <th class="px-6 py-4 text-center">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100 text-sm">
                                                {!loadingProductos && productos.map(p => (
                                                    <tr key={p.id} class="hover:bg-slate-50 transition">
                                                        <td class="px-6 py-4 font-mono text-xs text-slate-400 font-bold">#{p.id}</td>
                                                        <td class="px-6 py-4 font-medium text-slate-900">{p.nombre || <span class="text-slate-400 italic">Sin nombre</span>}</td>
                                                        <td class="px-6 py-4">
                                                            <span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md text-xs font-semibold border border-indigo-100">
                                                                {p.categoria || 'Sin Categoría'}
                                                            </span>
                                                        </td>
                                                        <td class={`px-6 py-4 text-right font-semibold text-slate-900`}>{clpFormatter.format(p.precio)}</td>
                                                        <td class="px-6 py-4 text-center space-x-1">
                                                            <button onClick={() => handleEditProductoClick(p.id)} class="inline-flex items-center p-1.5 text-indigo-600 hover:bg-indigo-50 rounded-md transition">
                                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                                            </button>
                                                            <button onClick={() => handleDeleteProducto(p.id)} class="inline-flex items-center p-1.5 text-red-600 hover:bg-red-50 rounded-md transition">
                                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {(loadingProductos || errorProductos) && (
                                        <div class="p-12 text-center text-slate-500">
                                            <span class="text-4xl block mb-2">{loadingProductos ? '⏳' : '🔍'}</span>
                                            <p class={errorProductos.includes('Error') ? 'text-red-500 font-medium' : ''}>
                                                {loadingProductos ? 'Consultando inventario...' : errorProductos}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ============================== TAB: CLIENTES ============================== */}
                        {activeTab === 'clientes' && (
                            <div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
                                    <form onSubmit={(e) => { e.preventDefault(); const t = searchCliente.trim(); setIsSearchClienteActive(!!t); loadClientes(t); }} class="flex flex-1 max-w-md gap-2">
                                        <input type="text" placeholder="Buscar cliente por nombre..." value={searchCliente}
                                            onChange={(e) => setSearchCliente(e.target.value)}
                                            class="w-full px-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                        <button type="submit" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition">Buscar</button>
                                        {isSearchClienteActive && (
                                            <button type="button" onClick={() => { setSearchCliente(''); setIsSearchClienteActive(false); loadClientes(); }} class="text-slate-500 hover:text-slate-800 text-sm px-2">Limpiar</button>
                                        )}
                                    </form>
                                    <button onClick={() => { setClienteFormData({ id: '', nombre: '', email: '' }); setIsClienteModalOpen(true); }}
                                        class="bg-duocamber-500 hover:bg-duocamber-600 text-duocnavy-900 font-bold px-5 py-2.5 rounded-lg text-sm font-semibold shadow flex items-center gap-2 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                        Nuevo Cliente
                                    </button>
                                </div>

                                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse">
                                            <thead>
                                                <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-semibold border-b border-slate-200">
                                                    <th class="px-6 py-4">ID</th>
                                                    <th class="px-6 py-4">Nombre</th>
                                                    <th class="px-6 py-4">Email</th>
                                                    <th class="px-6 py-4 text-center">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100 text-sm">
                                                {!loadingClientes && clientes.map(c => (
                                                    <tr key={c.id} class="hover:bg-slate-50 transition">
                                                        <td class="px-6 py-4 font-mono text-xs text-slate-400 font-bold">#{c.id}</td>
                                                        <td class="px-6 py-4 font-medium text-slate-900">{c.nombre}</td>
                                                        <td class="px-6 py-4 text-slate-600">{c.email}</td>
                                                        <td class="px-6 py-4 text-center space-x-1">
                                                            <button onClick={() => handleEditClienteClick(c.id)} class="inline-flex items-center p-1.5 text-indigo-600 hover:bg-indigo-50 rounded-md transition">
                                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                                            </button>
                                                            <button onClick={() => handleDeleteCliente(c.id)} class="inline-flex items-center p-1.5 text-red-600 hover:bg-red-50 rounded-md transition">
                                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {(loadingClientes || errorClientes) && (
                                        <div class="p-12 text-center text-slate-500">
                                            <span class="text-4xl block mb-2">{loadingClientes ? '⏳' : '🔍'}</span>
                                            <p class={errorClientes.includes('Error') ? 'text-red-500 font-medium' : ''}>
                                                {loadingClientes ? 'Cargando clientes...' : errorClientes}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ============================== TAB: CATEGORÍAS ============================== */}
                        {activeTab === 'categorias' && (
                            <div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex justify-end">
                                    <button onClick={() => { setCategoryFormData({ nombre: '' }); setIsCategoryModalOpen(true); }}
                                        class="bg-duocamber-500 hover:bg-duocamber-600 text-duocnavy-900 font-bold px-5 py-2.5 rounded-lg text-sm font-semibold shadow flex items-center gap-2 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                        Nueva Categoría
                                    </button>
                                </div>

                                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse">
                                            <thead>
                                                <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-semibold border-b border-slate-200">
                                                    <th class="px-6 py-4">ID</th>
                                                    <th class="px-6 py-4">Nombre</th>
                                                    <th class="px-6 py-4 text-center">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100 text-sm">
                                                {!loadingCategories && categories.map(cat => (
                                                    <tr key={cat.id} class="hover:bg-slate-50 transition">
                                                        <td class="px-6 py-4 font-mono text-xs text-slate-400 font-bold">#{cat.id}</td>
                                                        <td class="px-6 py-4">
                                                            <span class="bg-indigo-50 text-indigo-700 px-2 py-1 rounded-md text-xs font-semibold border border-indigo-100">
                                                                {cat.nombre}
                                                            </span>
                                                        </td>
                                                        <td class="px-6 py-4 text-center">
                                                            <button onClick={() => handleDeleteCategory(cat.id)} class="inline-flex items-center p-1.5 text-red-600 hover:bg-red-50 rounded-md transition">
                                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {(loadingCategories || categories.length === 0) && !loadingCategories && (
                                        <div class="p-12 text-center text-slate-500">
                                            <span class="text-4xl block mb-2">🏷️</span>
                                            <p>No hay categorías registradas.</p>
                                        </div>
                                    )}
                                    {loadingCategories && (
                                        <div class="p-12 text-center text-slate-500">
                                            <span class="text-4xl block mb-2">⏳</span>
                                            <p>Cargando categorías...</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ============================== TAB: VENTAS ============================== */}
                        {activeTab === 'ventas' && (
                            <div>
                                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex justify-end">
                                    <button onClick={() => { setVentaFormData({ clienteId: '', productoId: '', cantidad: '', notas: '' }); setIsVentaModalOpen(true); }}
                                        class="bg-duocamber-500 hover:bg-duocamber-600 text-duocnavy-900 font-bold px-5 py-2.5 rounded-lg text-sm font-semibold shadow flex items-center gap-2 transition">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                        Nueva Venta
                                    </button>
                                </div>

                                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div class="overflow-x-auto">
                                        <table class="w-full text-left border-collapse">
                                            <thead>
                                                <tr class="bg-slate-100 text-slate-600 text-xs uppercase font-semibold border-b border-slate-200">
                                                    <th class="px-4 py-4">ID</th>
                                                    <th class="px-4 py-4">Cliente</th>
                                                    <th class="px-4 py-4">Producto</th>
                                                    <th class="px-4 py-4 text-right">Cant.</th>
                                                    <th class="px-4 py-4 text-right">P. Unitario</th>
                                                    <th class="px-4 py-4 text-right">Total</th>
                                                    <th class="px-4 py-4">Fecha</th>
                                                    <th class="px-4 py-4">Notas</th>
                                                    <th class="px-4 py-4 text-center">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody class="divide-y divide-slate-100 text-sm">
                                                {!loadingVentas && ventas.map(v => (
                                                    <tr key={v.id} class="hover:bg-slate-50 transition">
                                                        <td class="px-4 py-4 font-mono text-xs text-slate-400 font-bold">#{v.id}</td>
                                                        <td class="px-4 py-4">
                                                            <div class="font-medium text-slate-900">{v.nombreCliente}</div>
                                                            <div class="text-xs text-slate-400">ID: {v.clienteId}</div>
                                                        </td>
                                                        <td class="px-4 py-4">
                                                            <div class="font-medium text-slate-900">{v.nombreProducto}</div>
                                                            <div class="text-xs text-slate-400">ID: {v.productoId}</div>
                                                        </td>
                                                        <td class="px-4 py-4 text-right font-medium">{v.cantidad}</td>
                                                        <td class="px-4 py-4 text-right text-slate-600">{clpFormatter.format(v.precioUnitario)}</td>
                                                        <td class="px-4 py-4 text-right font-semibold text-slate-900">{clpFormatter.format(v.totalVenta)}</td>
                                                        <td class="px-4 py-4 text-xs text-slate-500 whitespace-nowrap">
                                                            {new Date(v.fechaVenta).toLocaleString('es-CL')}
                                                        </td>
                                                        <td class="px-4 py-4 text-xs text-slate-500 max-w-[120px] truncate">{v.notas || '-'}</td>
                                                        <td class="px-4 py-4 text-center">
                                                            <button onClick={() => handleDeleteVenta(v.id)} class="inline-flex items-center p-1.5 text-red-600 hover:bg-red-50 rounded-md transition">
                                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {(loadingVentas || errorVentas) && (
                                        <div class="p-12 text-center text-slate-500">
                                            <span class="text-4xl block mb-2">{loadingVentas ? '⏳' : '🧾'}</span>
                                            <p class={errorVentas.includes('Error') ? 'text-red-500 font-medium' : ''}>
                                                {loadingVentas ? 'Cargando ventas...' : errorVentas}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                    </main>

                    {/* MODAL: Productos */}
                    {isProductoModalOpen && (
                        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-40">
                            <div class="bg-white rounded-xl shadow-xl border border-slate-200 max-w-lg w-full overflow-hidden">
                                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                                    <h3 class="text-lg font-bold text-slate-800">{productoFormData.id ? 'Actualizar Producto' : 'Crear Producto'}</h3>
                                    <button onClick={() => setIsProductoModalOpen(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleProductoFormSubmit} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Nombre del Producto *</label>
                                        <input type="text" required placeholder="Ej. Audífonos Sony XM5" value={productoFormData.nombre}
                                            onChange={(e) => setProductoFormData({...productoFormData, nombre: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                    </div>
                                    <div class="grid grid-cols-1 gap-4">
                                        <div>
                                            <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Precio (CLP) *</label>
                                            <input type="number" required min="0" value={productoFormData.precio}
                                                onChange={(e) => setProductoFormData({...productoFormData, precio: e.target.value})}
                                                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                        </div>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Categoría *</label>
                                        <select required value={productoFormData.categoria}
                                            onChange={(e) => setProductoFormData({...productoFormData, categoria: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 bg-white text-sm">
                                            <option value="">-- Selecciona una categoría --</option>
                                            {categories.map(cat => (
                                                <option key={cat.id} value={cat.nombre}>{cat.nombre}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div class="pt-4 border-t border-slate-100 flex justify-end space-x-2">
                                        <button type="button" onClick={() => setIsProductoModalOpen(false)} class="px-4 py-2 rounded-lg text-sm text-slate-600 bg-slate-100 hover:bg-slate-200">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 rounded-lg text-sm text-white bg-indigo-600 hover:bg-indigo-700 shadow">Guardar Producto</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Clientes */}
                    {isClienteModalOpen && (
                        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-40">
                            <div class="bg-white rounded-xl shadow-xl border border-slate-200 max-w-md w-full overflow-hidden">
                                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                                    <h3 class="text-lg font-bold text-slate-800">{clienteFormData.id ? 'Actualizar Cliente' : 'Crear Cliente'}</h3>
                                    <button onClick={() => setIsClienteModalOpen(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleClienteFormSubmit} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Nombre *</label>
                                        <input type="text" required placeholder="Ej. Juan Pérez" value={clienteFormData.nombre}
                                            onChange={(e) => setClienteFormData({...clienteFormData, nombre: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Email *</label>
                                        <input type="email" required placeholder="Ej. juan@example.com" value={clienteFormData.email}
                                            onChange={(e) => setClienteFormData({...clienteFormData, email: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                    </div>
                                    <div class="pt-4 border-t border-slate-100 flex justify-end space-x-2">
                                        <button type="button" onClick={() => setIsClienteModalOpen(false)} class="px-4 py-2 rounded-lg text-sm text-slate-600 bg-slate-100 hover:bg-slate-200">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 rounded-lg text-sm text-white bg-indigo-600 hover:bg-indigo-700 shadow">Guardar Cliente</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Categorías */}
                    {isCategoryModalOpen && (
                        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div class="bg-white rounded-xl shadow-xl border border-slate-200 max-w-md w-full overflow-hidden">
                                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                                    <h3 class="text-lg font-bold text-slate-800">Nueva Categoría</h3>
                                    <button onClick={() => setIsCategoryModalOpen(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleCategorySubmit} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Nombre de la Categoría *</label>
                                        <input type="text" required placeholder="Ej. Deportes, Libros, Hogar" value={categoryFormData.nombre}
                                            onChange={(e) => setCategoryFormData({...categoryFormData, nombre: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                    </div>
                                    <div class="pt-4 border-t border-slate-100 flex justify-end space-x-2">
                                        <button type="button" onClick={() => setIsCategoryModalOpen(false)} class="px-4 py-2 rounded-lg text-sm text-slate-600 bg-slate-100 hover:bg-slate-200">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 rounded-lg text-sm text-white bg-emerald-600 hover:bg-emerald-700 shadow">Crear Categoría</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* MODAL: Ventas */}
                    {isVentaModalOpen && (
                        <div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-40">
                            <div class="bg-white rounded-xl shadow-xl border border-slate-200 max-w-md w-full overflow-hidden">
                                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                                    <h3 class="text-lg font-bold text-slate-800">Registrar Venta</h3>
                                    <button onClick={() => setIsVentaModalOpen(false)} class="text-slate-400 hover:text-slate-600 text-xl font-bold">&times;</button>
                                </div>
                                <form onSubmit={handleVentaFormSubmit} class="p-6 space-y-4">
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">ID del Cliente *</label>
                                        <select required value={ventaFormData.clienteId}
                                            onChange={(e) => setVentaFormData({...ventaFormData, clienteId: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 bg-white text-sm">
                                            <option value="">-- Selecciona un cliente --</option>
                                            {clientes.map(c => (
                                                <option key={c.id} value={c.id}>#{c.id} — {c.nombre}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Producto *</label>
                                        <select required value={ventaFormData.productoId}
                                            onChange={(e) => setVentaFormData({...ventaFormData, productoId: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 bg-white text-sm">
                                            <option value="">-- Selecciona un producto --</option>
                                            {productos.map(p => (
                                                <option key={p.id} value={p.id}>#{p.id} — {p.nombre} ({clpFormatter.format(p.precio)})</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Cantidad *</label>
                                        <input type="number" required min="1" value={ventaFormData.cantidad}
                                            onChange={(e) => setVentaFormData({...ventaFormData, cantidad: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-semibold uppercase text-slate-500 mb-1">Notas (opcional)</label>
                                        <input type="text" placeholder="Ej. Despacho a domicilio" value={ventaFormData.notas}
                                            onChange={(e) => setVentaFormData({...ventaFormData, notas: e.target.value})}
                                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-duocamber-500 text-sm" />
                                    </div>
                                    <div class="pt-4 border-t border-slate-100 flex justify-end space-x-2">
                                        <button type="button" onClick={() => setIsVentaModalOpen(false)} class="px-4 py-2 rounded-lg text-sm text-slate-600 bg-slate-100 hover:bg-slate-200">Cancelar</button>
                                        <button type="submit" class="px-4 py-2 rounded-lg text-sm text-white bg-indigo-600 hover:bg-indigo-700 shadow">Registrar Venta</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Toast Alertas */}
                    {toast.visible && (
                        <div class={`fixed bottom-5 right-5 z-50 max-w-md p-4 rounded-xl shadow-lg text-sm font-medium text-white transition-all duration-300 ${
                            toast.type === 'success' ? 'bg-emerald-600' : 'bg-red-600'
                        }`}>
                            {toast.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
